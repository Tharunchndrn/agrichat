<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AgriChat — AI-powered agricultural assistant built with Google Gemini" />
    <title>AgriChat — Gemini Chatbot</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌱</text></svg>" />
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <div class="header-icon">🌱</div>
            <div class="header-info">
                <h1>AgriChat</h1>
                <p><span class="status-dot"></span>Powered by Gemini AI</p>
            </div>
        </header>

        <!-- Chat Area -->
        <main class="chat-area" id="chatArea">
            <div class="welcome">
                <span class="welcome-icon">🌾</span>
                <h2>Welcome to AgriChat</h2>
                <p>Your AI-powered agricultural assistant. Ask me anything about farming, crops, soil, weather, and
                    more!</p>
            </div>
        </main>

        <!-- Image Preview -->
        <div id="imagePreviewContainer" class="image-preview-container"></div>

        <!-- Input Area -->
        <footer class="input-area">
            <div class="input-wrapper">
                <input type="file" id="imageInput" accept="image/*" style="display: none;" />
                <button class="action-btn" id="uploadBtn" title="Add Image">
                    📷
                </button>
                <input type="text" id="chatInput" placeholder="Ask about agriculture..." autocomplete="off" autofocus />
                <button class="send-btn" id="sendBtn" aria-label="Send message">
                    ➤
                </button>
            </div>
        </footer>
    </div>

    <!-- Error Toast -->
    <div class="error-toast" id="errorToast"></div>

    <script src="script.js"></script>
</body>

</html>
